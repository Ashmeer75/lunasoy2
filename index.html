<!DOCTYPE html>
<html>
<head>
   <link rel="stylesheet" href="style.css">
    <title>LunaSoy Candles</title>
    <style>
/* ============================================================
   LunaSoy — styles.css
   Pink & blue candle-themed design, mobile-first responsive
   ============================================================ */

/* ── Variables ──────────────────────────────────────────── */
:root {
  --pink:       #f4a7bb;
  --pink-light: #fce4ec;
  --pink-deep:  #e87da0;
  --blue:       #90c4e8;
  --blue-light: #daeeff;
  --blue-deep:  #5a9fd4;
  --lavender:   #c9b8e8;
  --cream:      #fdf8f2;
  --warm-white: #fff9f5;
  --charcoal:   #2c2c2e;
  --mid:        #6b6b7b;
  --border:     rgba(244,167,187,.3);

  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;

  --radius-sm:  8px;
  --radius-md:  16px;
  --radius-lg:  24px;
  --shadow:     0 4px 24px rgba(244,167,187,.18);
  --shadow-lg:  0 8px 48px rgba(90,159,212,.15);
}

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-sans);
  background: var(--cream);
  color: var(--charcoal);
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }
input, textarea, select, button { font-family: inherit; }
button { cursor: pointer; border: none; background: none; }

/* ── Typography ─────────────────────────────────────────── */
h1, h2, h3 { font-family: var(--font-serif); font-weight: 300; line-height: 1.15; }
h1 { font-size: clamp(2.8rem, 7vw, 5.5rem); }
h2 { font-size: clamp(2rem, 4vw, 3rem); }
h3 { font-size: 1.6rem; }
h4 { font-size: 1rem; font-family: var(--font-sans); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; color: var(--mid); }
p  { line-height: 1.7; color: var(--mid); }
em { font-style: italic; color: var(--pink-deep); }
code { background: var(--pink-light); padding: .1em .4em; border-radius: 4px; font-size: .85em; }

/* ── Buttons ────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: .5rem; padding: .75rem 1.75rem;
  border-radius: 50px; font-size: .95rem; font-weight: 500;
  transition: all .25s ease; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, var(--pink-deep), var(--blue-deep));
  color: #fff; box-shadow: 0 4px 16px rgba(232,125,160,.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,125,160,.45); }
.btn-outline {
  border: 2px solid var(--pink-deep); color: var(--pink-deep); background: transparent;
}
.btn-outline:hover { background: var(--pink-light); }
.btn-ghost { color: var(--mid); text-decoration: underline; background: none; padding: .5rem; }
.btn-ghost:hover { color: var(--charcoal); }
.full-width { width: 100%; }

/* ── Navbar ─────────────────────────────────────────────── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem;
  background: rgba(253,248,242,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600; letter-spacing: .03em; }
.nav-links { display: flex; gap: 1.5rem; list-style: none; }
.nav-links a { font-size: .9rem; font-weight: 400; color: var(--mid); transition: color .2s; }
.nav-links a:hover { color: var(--pink-deep); }
.admin-link { color: var(--blue-deep) !important; font-weight: 500; }
.hamburger { display: none; font-size: 1.5rem; color: var(--mid); }

@media (max-width: 768px) {
  .nav-links { display: none; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0;
    background: var(--warm-white); padding: 1rem 2rem 2rem; border-bottom: 1px solid var(--border); }
  .nav-links.open { display: flex; }
  .hamburger { display: block; }
}

/* ── Hero ───────────────────────────────────────────────── */
.hero {
  min-height: 100vh; display: flex; align-items: center;
  padding: 7rem 2rem 4rem; position: relative; overflow: hidden;
  background: var(--warm-white);
}
.hero-glow {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: .35; pointer-events: none;
}
.glow-pink { width: 500px; height: 500px; background: var(--pink); top: -100px; left: -100px; animation: driftA 8s ease-in-out infinite; }
.glow-blue { width: 400px; height: 400px; background: var(--blue); bottom: -80px; right: -80px; animation: driftB 10s ease-in-out infinite; }
@keyframes driftA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
@keyframes driftB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

.hero-content { flex: 1; max-width: 600px; position: relative; z-index: 1; }
.hero-tagline { font-size: .85rem; letter-spacing: .18em; text-transform: uppercase; color: var(--pink-deep); margin-bottom: .75rem; }
.hero-title { margin-bottom: 1.25rem; }
.hero-sub { font-size: 1.05rem; margin-bottom: 2rem; max-width: 440px; }
.hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

/* Decorative candles */
.hero-candles { display: flex; align-items: flex-end; gap: 1.5rem; margin-left: auto; padding-right: 2rem; position: relative; z-index: 1; }
.candle { display: flex; flex-direction: column; align-items: center; }
.flame {
  width: 12px; height: 22px;
  background: radial-gradient(ellipse at center, #fff6a0 20%, #ffb347 60%, transparent 100%);
  border-radius: 50% 50% 30% 30%;
  animation: flicker 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 6px #ffb347);
  margin-bottom: 2px;
}
@keyframes flicker {
  0%,100%{transform:scaleY(1) skewX(0deg)} 25%{transform:scaleY(1.05) skewX(-3deg)} 75%{transform:scaleY(.95) skewX(3deg)}
}
.wax { width: 44px; border-radius: 6px 6px 4px 4px; }
.c1 .wax { height: 110px; background: linear-gradient(180deg, var(--pink-light), var(--pink)); }
.c2 .wax { height: 140px; background: linear-gradient(180deg, var(--blue-light), var(--blue)); width: 52px; }
.c3 .wax { height: 90px; background: linear-gradient(180deg, #f5e8ff, var(--lavender)); }
.c1 .flame { animation-delay: .3s; }
.c3 .flame { animation-delay: .6s; }
@media (max-width: 768px) { .hero-candles { display: none; } }

/* ── Sections ───────────────────────────────────────────── */
.section { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
.section-alt { background: var(--warm-white); max-width: 100%; padding: 5rem 2rem; }
.section-alt > * { max-width: 1200px; margin-left: auto; margin-right: auto; }

.section-header { text-align: center; margin-bottom: 3rem; }
.section-label { font-size: .8rem; letter-spacing: .18em; text-transform: uppercase; color: var(--pink-deep); display: block; margin-bottom: .5rem; }
.section-header h2 { margin-bottom: .75rem; }

/* ── Product Grid ───────────────────────────────────────── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.5rem;
}
.product-card {
  background: var(--warm-white); border-radius: var(--radius-lg);
  overflow: hidden; box-shadow: var(--shadow);
  transition: transform .3s, box-shadow .3s;
  border: 1px solid var(--border);
}
.product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
.product-img {
  height: 200px; display: flex; align-items: center; justify-content: center;
  font-size: 5rem; position: relative; overflow: hidden;
}
.product-badge {
  position: absolute; top: 12px; right: 12px;
  background: var(--pink-deep); color: #fff;
  font-size: .7rem; padding: .25rem .65rem; border-radius: 50px; font-weight: 500;
}
.product-info { padding: 1.25rem; }
.product-name { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: .3rem; }
.product-desc { font-size: .85rem; color: var(--mid); margin-bottom: 1rem; line-height: 1.5; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-size: 1.2rem; font-weight: 600; color: var(--pink-deep); }
.product-stock { font-size: .75rem; color: var(--mid); }
.add-btn { background: var(--pink-light); color: var(--pink-deep); border-radius: 50px; padding: .45rem 1.1rem; font-size: .85rem; font-weight: 500; transition: all .2s; }
.add-btn:hover { background: var(--pink-deep); color: #fff; }
.add-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Cart ───────────────────────────────────────────────── */
.cart-fab {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 90;
  background: linear-gradient(135deg, var(--pink-deep), var(--blue-deep));
  color: #fff; border-radius: 50px; padding: .7rem 1.3rem;
  font-size: 1rem; box-shadow: 0 6px 24px rgba(232,125,160,.4);
  display: flex; align-items: center; gap: .5rem;
  transition: transform .2s, box-shadow .2s;
}
.cart-fab:hover { transform: scale(1.05); }
.cart-count { background: #fff; color: var(--pink-deep); border-radius: 50%; width: 22px; height: 22px; font-size: .8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.cart-overlay { position: fixed; inset: 0; background: rgba(44,44,46,.4); z-index: 150; display: none; }
.cart-overlay.open { display: block; }
.cart-drawer {
  position: fixed; top: 0; right: -420px; width: 420px; max-width: 100vw;
  height: 100%; background: var(--warm-white); z-index: 160;
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,.12);
  transition: right .35s cubic-bezier(.4,0,.2,1);
}
.cart-drawer.open { right: 0; }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); }
.cart-close { font-size: 1.2rem; color: var(--mid); }
.cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
.cart-empty { text-align: center; color: var(--mid); padding: 3rem 0; }
.cart-item { display: flex; align-items: center; gap: 1rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
.cart-item-icon { font-size: 2rem; }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 500; font-size: .9rem; }
.cart-item-meta { font-size: .8rem; color: var(--mid); }
.cart-item-price { font-weight: 600; color: var(--pink-deep); }
.cart-item-remove { color: var(--mid); font-size: 1rem; }
.cart-item-remove:hover { color: #e05; }
.cart-footer { padding: 1.25rem; border-top: 1px solid var(--border); }
.cart-subtotal { display: flex; justify-content: space-between; font-size: 1rem; margin-bottom: 1rem; }

/* ── Custom Builder ─────────────────────────────────────── */
.custom-builder { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; }
@media (max-width: 900px) { .custom-builder { grid-template-columns: 1fr; } }

.builder-steps { display: flex; flex-direction: column; gap: 1.5rem; }
.builder-step {
  background: var(--cream); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 1.5rem; opacity: .7; transition: opacity .3s;
}
.builder-step.active { opacity: 1; border-color: var(--pink); box-shadow: var(--shadow); }
.builder-step h4 { margin-bottom: 1rem; }

.option-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem; }
.option-card {
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 1rem .75rem; cursor: pointer; transition: all .2s;
  background: var(--warm-white);
}
.option-card input { display: none; }
.option-card:hover { border-color: var(--pink); }
.option-card:has(input:checked) { border-color: var(--pink-deep); background: var(--pink-light); }
.option-icon { font-size: 1.8rem; }
.option-name { font-size: .85rem; font-weight: 500; }
.option-price { font-size: .8rem; color: var(--pink-deep); }

.scent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: .6rem; }
.scent-card {
  border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: .65rem 1rem; cursor: pointer; transition: all .2s;
  background: var(--warm-white);
}
.scent-card input { display: none; }
.scent-card span { font-size: .85rem; }
.scent-card:hover { border-color: var(--blue); }
.scent-card:has(input:checked) { border-color: var(--blue-deep); background: var(--blue-light); }

.color-swatches { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: .5rem; }
.swatch {
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  cursor: pointer; font-size: .8rem;
}
.swatch input { display: none; }
.swatch::before {
  content: ''; width: 36px; height: 36px; border-radius: 50%;
  background: var(--c); border: 3px solid transparent;
  transition: border-color .2s;
}
.swatch:has(input:checked)::before { border-color: var(--charcoal); }

/* Preview card */
.builder-sidebar { position: sticky; top: 90px; align-self: flex-start; }
.preview-card {
  background: var(--cream); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem; text-align: center;
  box-shadow: var(--shadow);
}
.preview-candle { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.25rem; }
.preview-flame {
  width: 14px; height: 28px;
  background: radial-gradient(ellipse at center, #fff6a0 20%, #ffb347 60%, transparent 100%);
  border-radius: 50% 50% 30% 30%;
  animation: flicker 1.8s ease-in-out infinite;
  filter: drop-shadow(0 0 8px #ffb347);
}
.preview-wax {
  width: 90px; height: 130px;
  background: linear-gradient(180deg, var(--pink-light), var(--pink));
  border-radius: 8px 8px 4px 4px;
  display: flex; align-items: center; justify-content: center;
  transition: background .4s;
}
.preview-label {
  font-family: var(--font-serif); font-size: .75rem; font-style: italic;
  color: rgba(44,44,46,.7); max-width: 70px; word-break: break-word; text-align: center;
}
.preview-name { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: .25rem; }
.preview-config { font-size: .8rem; color: var(--mid); margin-bottom: .5rem; }
.preview-price { font-size: 1.5rem; font-weight: 600; color: var(--pink-deep); margin-bottom: 1rem; }

/* ── Forms ──────────────────────────────────────────────── */
.label-options { display: flex; flex-direction: column; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: .4rem; }
.form-group label { font-size: .8rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--mid); }
.form-group input, .form-group select, .form-group textarea {
  padding: .7rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--warm-white); color: var(--charcoal); font-size: .95rem;
  transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--pink-deep);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

/* ── Checkout Modal ─────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(44,44,46,.5);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--warm-white); border-radius: var(--radius-lg);
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--warm-white); z-index: 1; }
.modal-close { font-size: 1.2rem; color: var(--mid); }
.modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

.shipping-calc { background: var(--pink-light); border-radius: var(--radius-sm); padding: 1rem; margin-top: .5rem; }
.shipping-options { display: flex; flex-direction: column; gap: .5rem; }
.shipping-opt { display: flex; align-items: center; gap: .75rem; padding: .5rem; cursor: pointer; }
.shipping-opt strong { margin-left: auto; color: var(--pink-deep); }

.payment-options { display: flex; flex-direction: column; gap: 1rem; }
.payment-btn {
  display: flex; align-items: center; justify-content: center; gap: .75rem;
  padding: .85rem; border-radius: var(--radius-sm); font-size: .95rem; font-weight: 500;
  border: 2px solid var(--border); transition: all .2s;
}
.paypal-btn { background: #ffc439; border-color: #ffc439; color: #003087; }
.paypal-btn:hover { background: #e6b000; }
.payment-divider { text-align: center; color: var(--mid); font-size: .85rem; position: relative; }
.payment-divider::before, .payment-divider::after {
  content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border);
}
.payment-divider::before { left: 0; }
.payment-divider::after { right: 0; }
.card-form { display: flex; flex-direction: column; gap: .75rem; }

.order-summary { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
.order-summary-item { display: flex; justify-content: space-between; font-size: .9rem; }
.order-totals { border-top: 1px solid var(--border); padding-top: .75rem; display: flex; flex-direction: column; gap: .3rem; }
.order-total-row { display: flex; justify-content: space-between; font-size: .9rem; }
.order-total-row.grand { font-weight: 700; font-size: 1.05rem; color: var(--pink-deep); }

/* Confirmation */
.confirm-animation { font-size: 5rem; text-align: center; animation: pop .5s cubic-bezier(.17,.67,.83,.67); }
@keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
.confirm-title { text-align: center; margin-bottom: .5rem; }
.confirm-sub { text-align: center; margin-bottom: 1rem; }
.confirm-order-id { text-align: center; background: var(--pink-light); border-radius: var(--radius-sm); padding: .75rem; margin-bottom: 1.5rem; font-size: .9rem; }
#step-confirm .btn { display: block; margin: 0 auto; }

/* ── Order History ──────────────────────────────────────── */
.order-lookup { max-width: 680px; margin: 0 auto; }
.lookup-form { display: flex; gap: 1rem; margin-bottom: 2rem; }
.lookup-form input { flex: 1; padding: .75rem 1rem; border: 1.5px solid var(--border); border-radius: 50px; font-size: .95rem; }
.lookup-form input:focus { outline: none; border-color: var(--pink-deep); }
.order-list { display: flex; flex-direction: column; gap: 1rem; }
.order-record {
  background: var(--warm-white); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 1.25rem; display: flex; justify-content: space-between; align-items: center;
}
.order-record-left { display: flex; flex-direction: column; gap: .3rem; }
.order-id-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: var(--mid); }
.order-items-summary { font-size: .9rem; }
.status-pill {
  padding: .35rem .85rem; border-radius: 50px; font-size: .78rem; font-weight: 600;
}
.status-pending   { background: #fff3cd; color: #856404; }
.status-processing{ background: var(--blue-light); color: var(--blue-deep); }
.status-shipped   { background: #d1e7dd; color: #0f5132; }
.status-delivered { background: var(--pink-light); color: var(--pink-deep); }

/* ── Admin Panel ────────────────────────────────────────── */
.admin-login { display: flex; justify-content: center; }
.admin-card {
  background: var(--warm-white); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 380px;
  box-shadow: var(--shadow);
}
.admin-card h4 { font-size: 1.1rem; text-transform: none; letter-spacing: 0; color: var(--charcoal); margin-bottom: 1.25rem; }
.admin-hint { font-size: .8rem; color: var(--mid); margin-top: .75rem; text-align: center; }

.admin-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card {
  background: var(--warm-white); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 1.25rem;
  box-shadow: var(--shadow);
}
.stat-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .1em; color: var(--mid); margin-bottom: .5rem; }
.stat-value { font-size: 2rem; font-family: var(--font-serif); font-weight: 600; color: var(--pink-deep); }
.stat-delta { font-size: .8rem; color: var(--blue-deep); margin-top: .25rem; }

.admin-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
.tab-btn { padding: .6rem 1.25rem; border-radius: 50px; font-size: .88rem; font-weight: 500; color: var(--mid); background: var(--cream); border: 1.5px solid var(--border); transition: all .2s; }
.tab-btn.active { background: var(--pink-deep); color: #fff; border-color: var(--pink-deep); }

.admin-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
.admin-table th { text-align: left; padding: .75rem 1rem; background: var(--pink-light); color: var(--mid); font-weight: 500; font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; border-bottom: 2px solid var(--border); }
.admin-table td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: var(--cream); }

.status-select { padding: .35rem .6rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: .82rem; background: var(--warm-white); }
.stock-input { width: 70px; padding: .35rem .5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-size: .88rem; }
.save-stock-btn { background: var(--blue-light); color: var(--blue-deep); border-radius: 50px; padding: .3rem .8rem; font-size: .8rem; font-weight: 500; margin-left: .5rem; transition: all .2s; }
.save-stock-btn:hover { background: var(--blue-deep); color: #fff; }

/* ── FAQ ────────────────────────────────────────────────── */
.faq-list { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: .75rem; }
.faq-item { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
.faq-question {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.1rem 1.5rem; cursor: pointer; font-weight: 500; font-size: .95rem;
  transition: background .2s;
}
.faq-question:hover { background: var(--pink-light); }
.faq-question .arrow { transition: transform .3s; color: var(--pink-deep); }
.faq-item.open .faq-question .arrow { transform: rotate(180deg); }
.faq-answer { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
.faq-answer-inner { padding: 0 1.5rem 1.25rem; color: var(--mid); line-height: 1.7; font-size: .92rem; }
.faq-item.open .faq-answer { max-height: 300px; }

/* ── Contact ────────────────────────────────────────────── */
.contact-layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 3rem; max-width: 900px; margin: 0 auto; }
@media (max-width: 700px) { .contact-layout { grid-template-columns: 1fr; } }
.contact-info { display: flex; flex-direction: column; gap: 1rem; }
.contact-item { display: flex; align-items: center; gap: .75rem; font-size: .95rem; color: var(--charcoal); }
.social-links { display: flex; gap: 1rem; margin-top: .5rem; flex-wrap: wrap; }
.social-link { background: var(--pink-light); color: var(--pink-deep); padding: .5rem 1.1rem; border-radius: 50px; font-size: .85rem; font-weight: 500; transition: all .2s; }
.social-link:hover { background: var(--pink-deep); color: #fff; }
.contact-form { display: flex; flex-direction: column; gap: 1rem; }

/* ── Footer ─────────────────────────────────────────────── */
.footer { background: var(--charcoal); color: rgba(255,255,255,.7); padding: 3rem 2rem; text-align: center; }
.footer-brand { font-family: var(--font-serif); font-size: 1.8rem; color: #fff; margin-bottom: .5rem; }
.footer-tagline { margin-bottom: .5rem; }
.footer-copy { font-size: .8rem; }

/* ── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 5.5rem; right: 2rem; z-index: 300;
  background: var(--charcoal); color: #fff;
  padding: .8rem 1.5rem; border-radius: 50px; font-size: .88rem;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  animation: slideUp .3s ease, fadeOut .3s ease 2.2s forwards;
  pointer-events: none;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes fadeOut { to{opacity:0;transform:translateY(-10px)} }

/* ── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 3px; }
    </style>
